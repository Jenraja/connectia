services:
  postgres:
    image: postgres:16
    container_name: connectia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: connectia
      POSTGRES_USER: connectia
      POSTGRES_PASSWORD: connectia_password
    ports:
      - "5432:5432"
    volumes:
      - connectia_pg:/var/lib/postgresql/data
volumes:
  connectia_pg:
